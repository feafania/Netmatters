<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
  <meta name="ROBOTS" content="NOINDEX, NOFOLLOW">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://db.onlinewebfonts.com/c/0265b98b68ecf1b3d801b5df4dc155e7?family=icomoon" rel="stylesheet">
  <title>Full Service Digital Agency | Cambridgeshire & Norfolk | Netmatters</title>
</head>

<body>
<div id="container">
  <header id="header">
    <div class="header__inner container">
      <div class="header__row">
        <div class="header__hero">
          <a href="#" class="header__logo">
            <picture>
              <source srcset="assets/images/f-logo.webp" type="image/webp">
              <source srcset="assets/images/f-logo.png" type="image/png">
              <img src="assets/images/f-logo.png" alt="Netmatters">
            </picture>
          </a>
        </div>

        <div class="header__mobile">
          <a href="#" class="header__mobile-link">
            <span class="icon-phone_in_talk" aria-hidden="true"></span>
          </a>
        </div>


        <div class="header__right">

          <div class="header__actions">

            <a href="#" target="_blank" class="header__btn header__btn--support">
              <span class="icon-mouse"></span>
              Support
            </a>

            <a href="#" class="header__btn header__btn--contact">
              <span class="icon-paperplane"></span>
              Contact
            </a>

            <form class="header__search" method="get" action="#">
              <label for="search-input" class="hidden">Search:</label>
              <input id="search-input" type="text" placeholder="Search..." class="header__search-input">
              <button type="submit" class="header__search-btn">
                <span class="glyphicon glyphicon-search"></span>
              </button>
            </form>

            <button class="header__hamburger hamburger" data-toggle="sidebar">
                        <span class="hamburger-box">
                            <span class="hamburger-inner"></span>
                        </span>
            </button>

          </div>

        </div>
      </div>

    </div>
  </header>
</div>

<footer class="footer">
  <div class="container">
    Footer
  </div>
</footer>
</body>
</html>
